<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>أعمالي - بوست انستغرام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
  body { background:#111; }
  .post {
    width:1080px; height:1080px; position:relative; overflow:hidden;
    background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 55%,#3b82f6 100%);
    color:#fff; display:flex; flex-direction:column;
  }
  /* decorative blobs */
  .blob { position:absolute; border-radius:50%; filter:blur(2px); opacity:.18; }
  .b1 { width:520px; height:520px; background:#60a5fa; top:-160px; left:-140px; }
  .b2 { width:420px; height:420px; background:#93c5fd; bottom:-140px; right:-120px; opacity:.14; }
  .grid { position:absolute; inset:0; opacity:.06;
    background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);
    background-size:60px 60px; }

  .top { padding:60px 80px 0; display:flex; align-items:center; gap:26px; z-index:2; }
  .logo-badge { width:118px; height:118px; border-radius:28px; background:#fff;
    display:flex; align-items:center; justify-content:center; box-shadow:0 20px 50px rgba(0,0,0,.25); }
  .logo-badge img { width:86px; height:86px; object-fit:contain; }
  .brand h1 { font-size:64px; font-weight:900; letter-spacing:-1px; }
  .brand p { font-size:26px; font-weight:600; color:#dbeafe; margin-top:4px; }

  .hero { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 80px; z-index:2; }
  .kicker { display:inline-block; align-self:flex-start; background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.35); padding:14px 30px; border-radius:100px;
    font-size:28px; font-weight:700; margin-bottom:34px; backdrop-filter:blur(6px); }
  .hero h2 { font-size:104px; font-weight:900; line-height:1.08; letter-spacing:-2px; }
  .hero h2 .hl { color:#fde047; }
  .hero .sub { font-size:38px; font-weight:600; color:#e0ecff; margin-top:30px; line-height:1.5; max-width:820px; }

  .features { display:flex; gap:20px; margin-top:40px; flex-wrap:wrap; }
  .chip { background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.28);
    padding:20px 30px; border-radius:20px; font-size:30px; font-weight:700;
    display:flex; align-items:center; gap:14px; backdrop-filter:blur(6px); }
  .chip .ic { font-size:34px; }

  .bottom { padding:0 80px 64px; display:flex; align-items:center; justify-content:space-between; z-index:2; }
  .cta { background:#fde047; color:#1e3a8a; font-size:36px; font-weight:900;
    padding:26px 54px; border-radius:100px; box-shadow:0 16px 40px rgba(0,0,0,.28); }
  .site { font-size:38px; font-weight:800; color:#fff; display:flex; align-items:center; gap:14px; }
  .site .dot { width:16px; height:16px; border-radius:50%; background:#4ade80; box-shadow:0 0 18px #4ade80; }
</style>
</head>
<body>
  <div class="post" id="post">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="grid"></div>

    <div class="top">
      <div class="logo-badge"><img src="assets/a3malilogo.png" alt="أعمالي" /></div>
      <div class="brand">
        <h1>أعمالي</h1>
        <p>نظام ERP ومحاسبة سحابي</p>
      </div>
    </div>

    <div class="hero">
      <span class="kicker">✦ إدارة أعمالك في مكان واحد</span>
      <h2>أدر أعمالك<br><span class="hl">بذكاء وسهولة</span></h2>
      <p class="sub">فوترة، مبيعات، مخزون، محاسبة، موظفين ونقطة بيع — كل شي بنظام واحد يشتغل حتى بدون إنترنت.</p>
      <div class="features">
        <div class="chip"><span class="ic">🧾</span> فوترة ومبيعات</div>
        <div class="chip"><span class="ic">📦</span> إدارة المخزون</div>
        <div class="chip"><span class="ic">💵</span> 3 عملات (ل.س / $ / ₺)</div>
        <div class="chip"><span class="ic">📴</span> يعمل أوفلاين</div>
      </div>
    </div>

    <div class="bottom">
      <div class="cta">جرّبه مجاناً الآن</div>
      <div class="site"><span class="dot"></span> a3mali.site</div>
    </div>
  </div>
</body>
</html>
